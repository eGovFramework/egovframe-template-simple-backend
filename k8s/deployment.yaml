apiVersion: apps/v1
kind: Deployment
metadata:
  name: egovframe-template-simple-backend
  labels:
    app.kubernetes.io/name: egovframe-template-simple-backend
    app.kubernetes.io/part-of: egovframe-template
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: egovframe-template-simple-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: egovframe-template-simple-backend
        app.kubernetes.io/part-of: egovframe-template
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: app
          # Replace with your registry/tag, e.g. ghcr.io/<org>/egovframe-template-simple-backend:5.0.0
          image: egovframe-template-simple-backend:5.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: egovframe-template-simple-backend
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: egovframe-template-simple-backend-db
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: egovframe-template-simple-backend-db
                  key: password
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # logback-spring.xml은 logging.file.path(기본 ./log → /app/log)에 로그 파일을 기록한다.
            # readOnlyRootFilesystem: true 환경에서 /app/log 쓰기가 막혀 기동에 실패하므로
            # 쓰기 가능한 emptyDir 볼륨을 마운트한다.
            - name: app-log
              mountPath: /app/log
      volumes:
        - name: tmp
          emptyDir: {}
        - name: app-log
          emptyDir: {}
